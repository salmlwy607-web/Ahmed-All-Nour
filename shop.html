<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر | صيدلية أبو نور</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .shop-header {
            background: var(--clr-primary-light);
            padding: 3rem 0;
            text-align: center;
            border-bottom: 1px solid var(--clr-border);
        }

        .shop-header h1 {
            font-size: 2.5rem;
            color: var(--clr-primary-dark);
            margin-bottom: 0.5rem;
        }

        body.dark-mode .shop-header {
            background: rgba(0, 168, 89, 0.1);
        }

        .shop-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            margin: 3rem auto;
        }

        @media (max-width: 992px) {
            .shop-container {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar Filters */
        .filter-sidebar {
            background: var(--clr-bg-card);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--clr-border);
            height: fit-content;
        }

        .filter-group {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--clr-border-light);
        }

        .filter-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .filter-group h4 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--clr-heading);
        }

        .filter-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .filter-list li {
            margin-bottom: 0.8rem;
        }

        .filter-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--clr-text);
            font-size: 0.95rem;
        }

        .filter-label input[type="checkbox"] {
            accent-color: var(--clr-primary);
            width: 16px;
            height: 16px;
        }

        .filter-label:hover {
            color: var(--clr-primary);
        }

        .filter-count {
            margin-inline-start: auto;
            color: var(--clr-text-light);
            font-size: 0.85rem;
        }

        /* Toolbar */
        .shop-toolbar {
            background: var(--clr-bg-card);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--clr-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .sort-select {
            padding: 0.5rem 1rem;
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-sm);
            background: var(--clr-bg-light);
            color: var(--clr-text);
            font-family: inherit;
            outline: none;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 3rem;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-sm);
            background: var(--clr-bg-card);
            color: var(--clr-text);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .page-btn:hover,
        .page-btn.active {
            background: var(--clr-primary);
            color: white;
            border-color: var(--clr-primary);
        }

        body.dark-mode .sort-select {
            background: var(--clr-bg-main);
            border-color: var(--clr-border);
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="main-header" style="border-bottom: 1px solid var(--clr-border);">
        <div class="container d-flex justify-between align-center py-3">
            <a href="index.html" class="logo d-flex align-center">
                <div class="logo-icon"><i class="fa-solid fa-capsules"></i></div>
                <div class="logo-text">
                    <h1>صيدلية أبو نور</h1>
                </div>
            </a>
            <div class="header-actions d-flex align-center gap-4">
                <a href="index.html" class="btn btn-outline" style="padding: 0.4rem 1rem; font-size: 0.9rem;"><i
                        class="fa-solid fa-home"></i> الرئيسية</a>
                <a href="checkout.html" class="btn btn-primary" style="padding: 0.4rem 1rem; font-size: 0.9rem;"><i
                        class="fa-solid fa-cart-shopping"></i> السلة (3)</a>
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode"
                    style="background:none; border:none; cursor:pointer;">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Page Title -->
    <div class="shop-header">
        <div class="container">
            <h1>جميع المنتجات</h1>
            <p class="text-muted">تصفح أحدث الأدوية، الفيتامينات، ومستحضرات التجميل.</p>
        </div>
    </div>

    <!-- Shop Content -->
    <div class="container shop-container">
        <!-- Sidebar -->
        <aside class="filter-sidebar glass-effect">
            <div class="filter-group">
                <h4>تصنيف المنتجات</h4>
                <ul class="filter-list">
                    <li><label class="filter-label"><input type="checkbox" checked> الكل <span
                                class="filter-count">(1520)</span></label></li>
                    <li><label class="filter-label"><input type="checkbox"> أدوية وعلاجات <span
                                class="filter-count">(850)</span></label></li>
                    <li><label class="filter-label"><input type="checkbox"> فيتامينات ومكملات <span
                                class="filter-count">(230)</span></label></li>
                    <li><label class="filter-label"><input type="checkbox"> عناية بالبشرة <span
                                class="filter-count">(310)</span></label></li>
                    <li><label class="filter-label"><input type="checkbox"> مستلزمات أطفال <span
                                class="filter-count">(130)</span></label></li>
                </ul>
            </div>

            <div class="filter-group">
                <h4>نطاق السعر (ج.م)</h4>
                <div style="display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem;">
                    <input type="number" placeholder="من" class="sort-select" style="width: 100%;">
                    <span>-</span>
                    <input type="number" placeholder="إلى" class="sort-select" style="width: 100%;">
                </div>
                <button class="btn btn-outline w-full" style="padding: 0.4rem;">تطبيق السعر</button>
            </div>

            <div class="filter-group">
                <h4>حالة المخزون</h4>
                <ul class="filter-list">
                    <li><label class="filter-label"><input type="checkbox" checked> متوفر <span
                                class="filter-count">(1400)</span></label></li>
                    <li><label class="filter-label"><input type="checkbox"> نفذت الكمية <span
                                class="filter-count">(120)</span></label></li>
                </ul>
            </div>
        </aside>

        <!-- Product Grid Area -->
        <main class="shop-main">
            <!-- Toolbar -->
            <div class="shop-toolbar glass-effect">
                <div class="results-count">عرض <strong>1-12</strong> من أصل <strong>1520</strong> منتج</div>
                <div class="sort-by d-flex align-center gap-2">
                    <label>الترتيب حسب:</label>
                    <select class="sort-select">
                        <option>الأحدث</option>
                        <option>السعر: من الأقل للأعلى</option>
                        <option>السعر: من الأعلى للأقل</option>
                        <option>الأكثر مبيعاً</option>
                    </select>
                </div>
            </div>

            <!-- Products Grid -->
            <!-- Note: Reusing the grid layout from index.html -> .products-grid-4 but with 3 cols for shop due to sidebar -->
            <div class="products-grid-4" id="shopProductsContainer"
                style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem;">
                <!-- Products populated dynamically from localStorage -->
                <div id="noProductsMsg" style="grid-column: 1 / -1; text-align: center; padding: 3rem; display: none;">
                    <i class="fa-solid fa-box-open"
                        style="font-size: 4rem; color: var(--clr-border); margin-bottom: 1rem; display: block;"></i>
                    <p class="text-muted">لا يوجد منتجات في هذا القسم حالياً.</p>
                </div>
            </div>

            <!-- Pagination (Placeholder for now) -->
            <div class="pagination" id="shopPagination">
                <button class="page-btn active">1</button>
            </div>
        </main>
    </div>

    <script>
        // Dark Mode Logic
        const themeBtn = document.getElementById('theme-toggle');
        const themeIcon = themeBtn.querySelector('i');
        const body = document.body;

        function applyTheme() {
            const savedTheme = localStorage.getItem('abunour_theme');
            if (savedTheme === 'dark') {
                body.classList.add('dark-mode');
                if (themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                body.classList.remove('dark-mode');
                if (themeIcon) themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        }
        applyTheme();

        if (themeBtn) {
            themeBtn.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                const isDark = body.classList.contains('dark-mode');
                localStorage.setItem('abunour_theme', isDark ? 'dark' : 'light');
                if (isDark) themeIcon.classList.replace('fa-moon', 'fa-sun');
                else themeIcon.classList.replace('fa-sun', 'fa-moon');
            });
        }

        // Load Dynamic Products from Admin
        const grid = document.getElementById('shopProductsContainer');
        const noProductsMsg = document.getElementById('noProductsMsg');
        const categoryCheckboxes = document.querySelectorAll('.filter-label input[type="checkbox"]');

        function renderProducts() {
            const adminProducts = JSON.parse(localStorage.getItem('abunour_products')) || [];
            grid.innerHTML = '';
            grid.appendChild(noProductsMsg);

            // Get active categories
            const activeCategories = Array.from(categoryCheckboxes)
                .filter(cb => cb.checked && cb.parentElement.textContent.trim() !== 'الكل')
                .map(cb => cb.parentElement.textContent.split('(')[0].trim());

            const isAllChecked = Array.from(categoryCheckboxes).find(cb => cb.parentElement.textContent.includes('الكل'))?.checked;

            const filteredProducts = adminProducts.filter(p => {
                if (isAllChecked || activeCategories.length === 0) return true;
                return activeCategories.some(cat => p.category.includes(cat) || cat.includes(p.category));
            });

            if (filteredProducts.length === 0) {
                noProductsMsg.style.display = 'block';
                return;
            }

            noProductsMsg.style.display = 'none';
            filteredProducts.reverse().forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card glass-effect hover-up fade-in';
                card.innerHTML = `
                    <ul class="product-actions">
                        <li><a href="#" title="إضافة للمفضلة"><i class="fa-regular fa-heart"></i></a></li>
                        <li><a href="product_details.html?id=${p.id}" title="نظرة سريعة"><i class="fa-regular fa-eye"></i></a></li>
                    </ul>
                    <div class="product-badges"><span class="badge-new">الجديد</span></div>
                    <div class="product-img" style="height: 180px; padding: 1rem; display:flex; align-items:center; justify-content:center;">
                        <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200?text=بدون+صورة'" style="max-height: 100%; object-fit: contain;">
                    </div>
                    <div class="product-content">
                        <div class="product-category">${p.category}</div>
                        <h3 class="product-title"><a href="product_details.html?id=${p.id}">${p.name}</a></h3>
                        <div class="product-price">
                            <span class="new-price">${p.price} ج.م</span>
                        </div>
                        <button class="btn btn-primary w-full add-to-cart-btn" onclick="window.location.href='product_details.html?id=${p.id}'" style="margin-top:10px;">
                            <i class="fa-solid fa-cart-plus"></i> إضافة للسلة
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Filter Event Listeners
        categoryCheckboxes.forEach(cb => {
            cb.addEventListener('change', (e) => {
                if (e.target.parentElement.textContent.includes('الكل') && e.target.checked) {
                    categoryCheckboxes.forEach(other => { if (other !== e.target) other.checked = false; });
                } else if (!e.target.parentElement.textContent.includes('الكل') && e.target.checked) {
                    const allCb = Array.from(categoryCheckboxes).find(c => c.parentElement.textContent.includes('الكل'));
                    if (allCb) allCb.checked = false;
                }
                renderProducts();
            });
        });

        // Initial Render
        renderProducts();

        // Sync with Admin live
        window.addEventListener('storage', (e) => {
            if (e.key === 'abunour_products') renderProducts();
        });
    </script>

</body>

</html>

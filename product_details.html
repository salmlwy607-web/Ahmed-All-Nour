<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="description"
        content="تفاصيل ومنتجات صيدلية أبو نور - اعرف المزيد عن دواعي الاستعمال، الجرعة، والسعر لمنتجك الطبي واستفد من عروضنا الحصرية وتوصيلنا السريع في أبوكبير.">
    <meta name="keywords"
        content="أدوية, شراء دواء, صيدلية أبو نور, استشارة طبية, فيتامينات, أسعار الأدوية, روشتة, دواء">
    <meta name="author" content="Abunour Pharmacy">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="تفاصيل المنتج | صيدلية أبو نور">
    <meta property="og:description"
        content="تعرف على تفاصيل هذا المنتج الطبي، مراجعات العملاء والسعر الحصري من صيدلية أبو نور.">
    <meta property="og:type" content="product">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | صيدلية أبو نور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-details {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 2rem;
            background: var(--clr-bg-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        @media (max-width: 768px) {
            .product-details {
                grid-template-columns: 1fr;
            }
        }

        .product-image-container {
            background: var(--clr-bg-light);
            border-radius: var(--radius-md);
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 500px;
            border: 1px solid var(--clr-border);
        }

        .product-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .product-info h1 {
            font-size: 2.2rem;
            color: var(--clr-heading);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .meta-info {
            display: flex;
            gap: 1rem;
            color: var(--clr-text-light);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .meta-info span i {
            color: var(--clr-primary);
            margin-inline-end: 0.3rem;
        }

        .price-block {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--clr-border-light);
        }

        .current-price {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--clr-primary);
        }

        .stock-badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            color: var(--clr-success);
            padding: 0.4rem 1rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.9rem;
            margin-inline-start: 1rem;
            vertical-align: super;
        }

        .desc-text {
            color: var(--clr-text);
            line-height: 1.8;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .uses-list {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: var(--clr-primary-light);
            border-radius: var(--radius-sm);
            border-right: 4px solid var(--clr-primary);
        }

        .uses-list h3 {
            color: var(--clr-primary-dark);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .uses-list p {
            margin: 0;
            color: var(--clr-secondary);
            line-height: 1.6;
        }

        .action-block {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            align-items: stretch;
        }

        .qty-input {
            width: 80px;
            text-align: center;
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-sm);
            font-size: 1.2rem;
            font-weight: 600;
            background: var(--clr-bg-light);
            color: var(--clr-heading);
        }

        .add-cart-large {
            flex: 1;
            font-size: 1.2rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* Chat Widget Styles */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
        }

        .chat-toggle {
            width: 60px;
            height: 60px;
            background: var(--clr-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            transition: transform var(--transition-fast);
        }

        .chat-toggle:hover {
            transform: scale(1.1);
        }

        .chat-window {
            position: absolute;
            bottom: 80px;
            left: 0;
            width: 350px;
            height: 450px;
            background: var(--clr-bg-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--clr-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0);
            transform-origin: bottom left;
            transition: var(--transition-normal);
            opacity: 0;
            pointer-events: none;
        }

        .chat-window.active {
            transform: scale(1);
            opacity: 1;
            pointer-events: all;
        }

        .chat-header {
            background: var(--clr-primary);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .chat-header h4 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
        }

        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            background: var(--clr-bg-light);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .msg {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: var(--radius-lg);
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }

        .msg-bot {
            background: white;
            color: var(--clr-text);
            align-self: flex-start;
            border-bottom-right-radius: 0;
            box-shadow: var(--shadow-sm);
        }

        .msg-user {
            background: var(--clr-primary);
            color: white;
            align-self: flex-end;
            border-bottom-left-radius: 0;
            box-shadow: var(--shadow-sm);
        }

        .chat-input {
            padding: 1rem;
            background: var(--clr-white);
            border-top: 1px solid var(--clr-border);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input input {
            flex: 1;
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-full);
            padding: 0.5rem 1rem;
            background: var(--clr-bg-light);
            color: var(--clr-text);
            outline: none;
        }

        .chat-input button {
            width: 40px;
            height: 40px;
            background: var(--clr-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <!-- Header simplified -->
    <header class="main-header" style="border-bottom: 1px solid var(--clr-border);">
        <div class="container d-flex justify-between align-center py-3">
            <a href="index.html" class="logo d-flex align-center">
                <div class="logo-icon"><i class="fa-solid fa-capsules"></i></div>
                <div class="logo-text">
                    <h1>صيدلية أبو نور</h1>
                </div>
            </a>
            <a href="checkout.html" class="btn btn-primary"><i class="fa-solid fa-cart-shopping"></i> إتمام الشراء</a>
        </div>
    </header>

    <!-- Product Details Content -->
    <div class="product-details" id="productDetailsContainer">
        <!-- Will be populated by JS -->
        <h2 style="grid-column: 1 / -1; text-align: center; padding: 5rem 0;">جارِ تحميل تفاصيل المنتج...</h2>
    </div>

    <!-- Live Pharmacy Chat Widget -->
    <div class="chat-widget">
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <h4><i class="fa-solid fa-user-doctor"></i> الصيدلي الآلي</h4>
                <button class="btn text-white" id="closeChat"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="msg msg-bot">
                    مرحباً بك في صيدلية أبو نور 💊 كيف يمكنني مساعدتك اليوم؟ (مثال: عندي صداع، أو مريض ضغط وأحتاج
                    فيتامين)
                </div>
            </div>
            <form class="chat-input" id="chatForm">
                <input type="text" id="chatInputBar" placeholder="اكتب استشارتك هنا..." autocomplete="off" required>
                <button type="submit"><i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
        <div class="chat-toggle" id="openChat">
            <i class="fa-solid fa-comment-medical"></i>
        </div>
    </div>


    <script>
        // --- 1. Load Custom Product from LocalStorage ---
        const products = JSON.parse(localStorage.getItem('abunour_products')) || [];
        const container = document.getElementById('productDetailsContainer');
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let p = null;

        if (productId) {
            p = products.find(prod => prod.id === productId);
        } else if (products.length > 0) {
            p = products[products.length - 1];
        }

        if (p) {
            // Build gallery items based on images provided
            let mainImage = p.image;
            let image2 = p.image2;
            let galleryHTML = '';

            if (image2) {
                // He added 2 images, so let's show thumbnails
                galleryHTML = `
                <div style="display:flex; gap: 1rem; margin-top: 1rem; justify-content: center;">
                    <div style="width: 80px; height: 80px; border: 2px solid var(--clr-primary); border-radius: var(--radius-sm); padding: 0.5rem; cursor: pointer; background: var(--clr-bg-white);" onclick="document.getElementById('mainProductImage').src='${p.image}'">
                        <img src="${p.image}" style="width: 100%; height: 100%; object-fit: contain;" onerror="this.src='https://via.placeholder.com/80?text=الصورة+1'">
                    </div>
                    <div style="width: 80px; height: 80px; border: 2px solid transparent; border-radius: var(--radius-sm); padding: 0.5rem; cursor: pointer; background: var(--clr-bg-white); box-shadow: var(--shadow-sm);" onclick="document.getElementById('mainProductImage').src='${image2}'" onmouseover="this.style.borderColor='var(--clr-primary)'" onmouseout="this.style.borderColor='transparent'">
                        <img src="${image2}" style="width: 100%; height: 100%; object-fit: contain;" onerror="this.src='https://via.placeholder.com/80?text=الصورة+2'">
                    </div>
                </div>`;
            }

            container.innerHTML = `
                <div>
                    <div class="product-image-container">
                        <img id="mainProductImage" src="${mainImage}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/400?text=لا+توجد+صورة'">
                    </div>
                    ${galleryHTML}
                </div>
                <div class="product-info">
                    <div class="meta-info">
                        <span><i class="fa-solid fa-tags"></i> ${p.category}</span>
                        <span><i class="fa-solid fa-barcode"></i> كود: ${p.id}</span>
                    </div>
                    <h1>${p.name}</h1>
                    
                    <div class="price-block">
                        <span class="current-price">${p.price} ج.م</span>
                        <span class="stock-badge"><i class="fa-solid fa-check-circle"></i> متوفر بالمخزن</span>
                    </div>
                    
                    <p class="desc-text">${p.description}</p>
                    
                    <div class="uses-list">
                        <h3><i class="fa-solid fa-stethoscope"></i> دواعي الاستعمال:</h3>
                        <p>${p.uses}</p>
                    </div>
                    
                    <div class="action-block">
                        <input type="number" class="qty-input" value="1" min="1">
                        <a href="checkout.html" class="btn btn-primary add-cart-large">
                            <i class="fa-solid fa-cart-arrow-down"></i> أضف للسلة واشتري الآن
                        </a>
                    </div>
                </div>
            `;
        } else {
            // Default Demo Product View if admin is empty
            container.innerHTML = `
                <div>
                    <div class="product-image-container">
                        <img id="mainProductImage" src="https://images.unsplash.com/photo-1584017911766-d451b3d0e843?w=400&q=80" alt="فيتامين سي">
                    </div>
                    <div class="product-gallery">
                        <div style="width: 80px; height: 80px; border: 2px solid var(--clr-primary); border-radius: var(--radius-sm); padding: 0.5rem; cursor: pointer; background: var(--clr-bg-white);" onclick="document.getElementById('mainProductImage').src='https://images.unsplash.com/photo-1584017911766-d451b3d0e843?w=400&q=80'">
                            <img src="https://images.unsplash.com/photo-1584017911766-d451b3d0e843?w=400&q=80" style="width: 100%; height: 100%; object-fit: contain;">
                        </div>
                        <div style="width: 80px; height: 80px; border: 2px solid transparent; border-radius: var(--radius-sm); padding: 0.5rem; cursor: pointer; background: var(--clr-bg-white); box-shadow: var(--shadow-sm);" onclick="document.getElementById('mainProductImage').src='https://cdn-icons-png.flaticon.com/512/2885/2885412.png'">
                            <img src="https://cdn-icons-png.flaticon.com/512/2885/2885412.png" style="width: 100%; height: 100%; object-fit: contain;">
                        </div>
                    </div>
                </div>
                <div class="product-info">
                    <div class="meta-info">
                        <span><i class="fa-solid fa-tags"></i> فيتامينات</span>
                        <span><i class="fa-solid fa-barcode"></i> كود: DEF-100</span>
                    </div>
                    <h1>فيتامين سي 1000مج كبسولات</h1>
                    
                    <div class="price-block">
                        <span class="current-price">140 ج.م</span>
                        <span class="stock-badge"><i class="fa-solid fa-check-circle"></i> متوفر بالمخزن</span>
                    </div>
                    
                    <p class="desc-text">فيتامين سي بتركيز 1000 مجم مع إضافة عنصر الزنك، يوفر دعمًا ممتازًا لجهاز المناعة. تم تصميمه بتركيبة احترافية سريعة الامتصاص لضمان أقصى استفادة للجسم.</p>
                    
                    <div class="uses-list">
                        <h3><i class="fa-solid fa-stethoscope"></i> الاستخدامات:</h3>
                        <p>يستخدم لتقوية المناعة، محاربة نزلات البرد والأنفلونزا، ودعم صحة البشرة وزيادة نضارتها. ينصح بكبسولة واحدة يومياً بعد الإفطار.</p>
                    </div>
                    
                    <div class="action-block">
                        <input type="number" class="qty-input" value="1" min="1">
                        <a href="checkout.html" class="btn btn-primary add-cart-large">
                            <i class="fa-solid fa-cart-arrow-down"></i> أضف للسلة واشتري الآن
                        </a>
                    </div>
                    <div style="margin-top:2rem;color:var(--clr-text-light);font-size:0.9rem">
                        <em>ملاحظة: يمكنك إضافة منتجاتك الخاصة من لوحة تحكم الإدارة (admin.html) لتبدأ بالظهور هنا.</em>
                    </div>
                </div>
            `;
        }

        // --- 2. Chat Widget Logic ---
        const chatWindow = document.getElementById('chatWindow');
        const openChatBtn = document.getElementById('openChat');
        const closeChatBtn = document.getElementById('closeChat');
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInputBar');
        const messagesBox = document.getElementById('chatMessages');

        openChatBtn.addEventListener('click', () => chatWindow.classList.add('active'));
        closeChatBtn.addEventListener('click', () => chatWindow.classList.remove('active'));

        // Basic Bot Logic
        chatForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;

            // Append User msg
            messagesBox.innerHTML += `<div class="msg msg-user">${text}</div>`;
            chatInput.value = '';
            messagesBox.scrollTop = messagesBox.scrollHeight;

            // Bot Reply Simulation after delay
            setTimeout(() => {
                let reply = '';
                if (text.includes('امراض') || text.includes('تعبان')) {
                    reply = "ألف سلامة عليك! برجاء الانتباه أنني مساعد آلي للصيدلية. إذا كنت تعاني من أعراض خطيرة يرجى استشارة طبيب متخصص فوراً. لكن إذا كانت أعراض عادية (مثل البرد أو الصداع) يمكنك شرحها لي لأقترح لك العلاج المتاح لدينا هنا.";
                } else if (text.includes('صداع')) {
                    reply = "للصداع يمكنني اقتراح 'بانادول اكسترا' وهو متوفر لدينا حالياً. هل ترغب في إضافته للسلة؟ 💊";
                } else if (text.includes('فيتامين')) {
                    reply = "لدينا تشكيلة رائعة من الفيتامينات مثل (فيتامين سي 1000مج) لتقوية المناعة. يمكنك تصفح قسم الفيتامينات في المتجر.";
                } else {
                    reply = "شكراً لتواصلك. صيدليتنا توفر الدفع عند الاستلام داخل أبوكبير والتوصيل فوري. هل تبحث عن منتج معين لتطلبه الآن؟";
                }

                messagesBox.innerHTML += `<div class="msg msg-bot">${reply}</div>`;
                messagesBox.scrollTop = messagesBox.scrollHeight;
            }, 1000);
        });
    </script>
</body>

</html>
